<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>股票研究笔记</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:#f8f9fa;color:#333;min-height:100vh}
  .wrap{max-width:720px;margin:0 auto;padding:48px 20px}
  h1{font-size:28px;font-weight:700;margin-bottom:6px}
  .desc{color:#666;font-size:15px;margin-bottom:36px}
  .grid{display:grid;gap:16px}
  .card{background:#fff;border-radius:12px;padding:24px;text-decoration:none;color:inherit;border:1px solid #e8e8e8;transition:box-shadow .2s,border-color .2s;display:flex;align-items:center;gap:20px}
  .card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);border-color:#d0d0d0}
  .card-icon{width:48px;height:48px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .icon-industry{background:#e8f5e9;color:#2e7d32}
  .icon-stocks{background:#e3f2fd;color:#1565c0}
  .icon-plans{background:#fff3e0;color:#e65100}
  .card-body h2{font-size:17px;font-weight:600;margin-bottom:2px}
  .card-body p{font-size:13px;color:#888}
  .card-body .count{display:inline-block;margin-top:4px;font-size:12px;background:#f0f0f0;padding:2px 8px;border-radius:10px;color:#666}
  .footer{text-align:center;font-size:12px;color:#bbb;margin-top:48px}
</style>
</head>
<body>
<div class="wrap">
  <h1>📈 股票研究笔记</h1>
  <p class="desc">行业分析 → 个股基本面 → 交易计划</p>
  <div class="grid">
    <a class="card" href="industry/">
      <div class="card-icon icon-industry">📊</div>
      <div class="card-body">
        <h2>行业报告</h2>
        <p>A股行业全景分析 · 产业链 · 周期时机</p>
        <span class="count">3 份</span>
      </div>
    </a>
    <a class="card" href="stocks/">
      <div class="card-icon icon-stocks">📋</div>
      <div class="card-body">
        <h2>个股报告</h2>
        <p>L1-L6 基本面分析 · 财务排雷 · 估值</p>
        <span class="count">24 份</span>
      </div>
    </a>
    <a class="card" href="plans/">
      <div class="card-icon icon-plans">📄</div>
      <div class="card-body">
        <h2>交易计划</h2>
        <p>L11-L13 估值定价 · 仓位 · 止盈止损</p>
        <span class="count">1 份</span>
      </div>
    </a>
  </div>
  <div class="footer">仅限个人研究参考，不构成投资建议</div>
</div>
</body>
</html>
